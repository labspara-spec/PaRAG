apiVersion: v1
kind: Service
metadata:
  name: {{ include "madrag.fullname" . }}
  labels:
    {{- include "madrag.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.env.PORT }}
      protocol: TCP
      name: http
  selector:
    {{- include "madrag.selectorLabels" . | nindent 4 }}
